name: Publish to ClawHub

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Authenticate
        run: clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}" --no-browser

      - name: Get version
        id: version
        run: |
          # Version = latest git tag base + commits since tag as patch
          # e.g. tag v1.1.0 + 3 commits = 1.1.3
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            BASE=$(echo "$LATEST_TAG" | sed 's/^v//' | sed 's/\.[0-9]*$//')
            PATCH=$(git rev-list --count "$LATEST_TAG"..HEAD)
          else
            BASE="1.1"
            PATCH=0
          fi
          echo "version=${BASE}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: |
          clawhub publish . --slug awesome-remote-control --name "Claude Remote Control" --version "${{ steps.version.outputs.version }}" || {
            if [ $? -eq 1 ]; then
              echo "Version ${{ steps.version.outputs.version }} already exists, skipping."
            else
              exit 1
            fi
          }
